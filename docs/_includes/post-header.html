<header class="post-header">
  <p class="post-meta">
    <time datetime="{{ include.date | date_to_xmlschema }}">{{ include.date | date: "%B %d, %Y" }}</time>
    {% if include.author %}
      <span class="post-meta-sep" aria-hidden="true">·</span>
      <span class="post-author">{{ include.author }}</span>
    {% endif %}
  </p>
  {% if include.description %}
    <p class="post-lead">{{ include.description }}</p>
  {% endif %}
</header>
